<!DOCTYPE html>
<html>
<head>
    <title>Microservices App</title>
</head>
<body>

<h1>🚀 DevOps Microservices App</h1>

<button onclick="loadProducts()">Load Products</button>

<ul id="list"></ul>

<script>
function loadProducts() {
    fetch("http://product-service:5000/products")
        .then(res => res.json())
        .then(data => {
            let list = document.getElementById("list");
            list.innerHTML = "";
            data.forEach(p => {
                let li = document.createElement("li");
                li.innerText = p.name;
                list.appendChild(li);
            });
        });
}
</script>

</body>
</html>
